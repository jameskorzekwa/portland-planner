name: CI, Pages, and Release

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
      - name: Install validation tools
        run: npm ci
      - name: Lint, test, and verify site
        run: npm run verify

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Stage static site
        run: |
          mkdir _site
          cp index.html .nojekyll _site/
          cp -R assets _site/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  release:
    name: Publish patch release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy
    runs-on: ubuntu-latest
    concurrency:
      group: releases-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Check out repository and tags
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Calculate patch version
        id: version
        shell: bash
        run: |
          current=""
          while IFS= read -r tag; do
            if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              current="$tag"
              break
            fi
          done < <(git tag --points-at "$GITHUB_SHA" --list 'v*' --sort=-v:refname)

          if [[ -n "$current" ]]; then
            next="$current"
          else
            latest=""
            while IFS= read -r tag; do
              if [[ "$tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                latest="$tag"
                major="${BASH_REMATCH[1]}"
                minor="${BASH_REMATCH[2]}"
                patch="${BASH_REMATCH[3]}"
                break
              fi
            done < <(git tag --list 'v*' --sort=-v:refname)

            if [[ -z "$latest" ]]; then
              next="v0.1.0"
            else
              next="v${major}.${minor}.$((patch + 1))"
            fi
          fi

          echo "tag=$next" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --target "$GITHUB_SHA" --title "$TAG" --generate-notes
